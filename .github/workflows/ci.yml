name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PrivacyMask.Desktop.slnx

      - name: Build
        run: dotnet build PrivacyMask.Desktop.slnx --no-restore

      - name: Test
        run: dotnet test PrivacyMask.Desktop.slnx --no-build
